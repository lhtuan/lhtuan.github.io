<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <!-- Play Store feature graphic: 1024 x 500. Required for new app listings. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1a2e"/>
      <stop offset="1" stop-color="#1a2542"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13c895"/>
      <stop offset="1" stop-color="#0a8f6b"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f8fb"/>
      <stop offset="1" stop-color="#e7eaf0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Decorative dots -->
  <g opacity=".15" fill="#10b981">
    <circle cx="900" cy="60" r="80"/>
    <circle cx="80" cy="440" r="60"/>
    <circle cx="200" cy="80" r="3"/>
    <circle cx="240" cy="120" r="2"/>
    <circle cx="170" cy="160" r="2"/>
    <circle cx="850" cy="380" r="3"/>
    <circle cx="900" cy="430" r="2"/>
  </g>

  <!-- Left content -->
  <g transform="translate(80 110)">
    <!-- Monogram tile -->
    <rect width="72" height="72" rx="18" fill="url(#acc)"/>
    <g transform="translate(20 16) scale(0.45)">
      <path d="M0 0 L72 0 L72 18 L22 18 L22 34 L58 34 L58 52 L22 52 L22 96 L0 96 Z" fill="#fff"/>
      <path d="M74 22 L98 22 L88 42 L98 42 L70 80 L82 56 L70 56 Z" fill="#fff" opacity=".92"/>
    </g>

    <!-- Wordmark text -->
    <text x="92" y="50" font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif" font-size="36" font-weight="700" letter-spacing="-1" fill="#fff">FastSpend</text>

    <!-- Headline -->
    <text x="0" y="140" font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif" font-size="56" font-weight="800" letter-spacing="-2" fill="#fff">Log a spend in</text>
    <text x="0" y="200" font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif" font-size="56" font-weight="800" letter-spacing="-2" fill="#7ee5b9">3 seconds.</text>

    <!-- Sub -->
    <text x="0" y="248" font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif" font-size="20" font-weight="400" fill="#a0adc5">Tap. Tap. Done.</text>
    <text x="0" y="276" font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif" font-size="20" font-weight="400" fill="#a0adc5">No accounts. No setup. Just speed.</text>
  </g>

  <!-- Right phone mockup -->
  <g transform="translate(680 50)">
    <rect width="240" height="400" rx="32" fill="#0a0f1a"/>
    <rect x="10" y="10" width="220" height="380" rx="24" fill="url(#phone)"/>
    <!-- Status -->
    <text x="30" y="32" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#0d1424">9:41</text>
    <!-- Toggle -->
    <rect x="80" y="22" width="80" height="20" rx="10" fill="#eef1f7"/>
    <rect x="83" y="25" width="38" height="14" rx="7" fill="#fff"/>
    <text x="92" y="35" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#0d1424">Spend</text>
    <text x="128" y="35" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="#6b7689">Income</text>
    <!-- Amount -->
    <text x="120" y="92" font-family="-apple-system, sans-serif" font-size="11" fill="#6b7689" text-anchor="middle">VND</text>
    <text x="120" y="130" font-family="-apple-system, sans-serif" font-size="36" font-weight="700" fill="#0d1424" text-anchor="middle">50,000đ</text>
    <!-- Active category -->
    <g transform="translate(20 150)">
      <circle cx="32" cy="20" r="20" fill="#dff7ec" stroke="#10b981" stroke-width="2.5"/>
      <text x="32" y="26" font-size="18" text-anchor="middle">☕</text>
      <text x="32" y="60" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#10b981" text-anchor="middle">Coffee</text>
      <g transform="translate(50 0)">
        <circle cx="32" cy="20" r="20" fill="#eef1f7"/>
        <text x="32" y="26" font-size="16" text-anchor="middle">🍜</text>
      </g>
      <g transform="translate(100 0)">
        <circle cx="32" cy="20" r="20" fill="#eef1f7"/>
        <text x="32" y="26" font-size="16" text-anchor="middle">🚖</text>
      </g>
      <g transform="translate(150 0)">
        <circle cx="32" cy="20" r="20" fill="#eef1f7"/>
        <text x="32" y="26" font-size="16" text-anchor="middle">🛍️</text>
      </g>
    </g>
    <!-- Numpad simplified -->
    <g transform="translate(30 230)">
      <text x="0" y="14" font-size="18" font-weight="600" fill="#0d1424">1</text>
      <text x="40" y="14" font-size="18" font-weight="600" fill="#0d1424">2</text>
      <text x="80" y="14" font-size="18" font-weight="600" fill="#0d1424">3</text>
      <text x="120" y="14" font-size="18" font-weight="600" fill="#0d1424">4</text>
      <text x="160" y="14" font-size="18" font-weight="600" fill="#0d1424">5</text>
      <text x="0" y="40" font-size="18" font-weight="600" fill="#0d1424">6</text>
      <text x="40" y="40" font-size="18" font-weight="600" fill="#0d1424">7</text>
      <text x="80" y="40" font-size="18" font-weight="600" fill="#0d1424">8</text>
      <text x="120" y="40" font-size="18" font-weight="600" fill="#0d1424">9</text>
      <text x="160" y="40" font-size="18" font-weight="600" fill="#0d1424">0</text>
    </g>
    <!-- FAB -->
    <rect x="30" y="320" width="180" height="40" rx="12" fill="url(#acc)"/>
    <text x="120" y="345" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Save · ⏎</text>
  </g>
</svg>
