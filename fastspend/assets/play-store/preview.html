<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>FastSpend — Play Store Assets</title>
<style>
  :root{--bg:#0b1220;--ink:#e6ecf5;--muted:#8898b3;--card:#0f1a2e}
  body{margin:0;padding:48px 24px;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif}
  h1{text-align:center;font-size:32px;letter-spacing:-.02em;margin:0 0 8px}
  .sub{text-align:center;color:var(--muted);margin-bottom:48px}
  .row{max-width:1200px;margin:0 auto 48px}
  .row h2{font-size:14px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:0 0 16px}
  .feat{width:100%;max-width:1024px;border-radius:14px;display:block;margin:0 auto;border:1px solid rgba(255,255,255,.08)}
  .shots{display:flex;gap:18px;justify-content:center;flex-wrap:wrap}
  .shot{width:220px}
  .shot img{width:100%;border-radius:18px;border:1px solid rgba(255,255,255,.08)}
  .shot .lbl{text-align:center;color:var(--muted);font-size:12px;margin-top:8px}
</style></head><body>
<h1>Play Store assets</h1>
<p class="sub">Feature graphic (1024×500) + five portrait screenshots (1080×1920). Convert to PNG before upload.</p>

<div class="row">
  <h2>Feature graphic</h2>
  <img class="feat" src="feature-graphic.svg" alt="Feature graphic"/>
</div>

<div class="row">
  <h2>Screenshots</h2>
  <div class="shots">
    <div class="shot"><img src="screenshot-1-numpad.svg"/><div class="lbl">1 · Numpad entry</div></div>
    <div class="shot"><img src="screenshot-2-widget.svg"/><div class="lbl">2 · Widgets</div></div>
    <div class="shot"><img src="screenshot-3-voice.svg"/><div class="lbl">3 · Voice</div></div>
    <div class="shot"><img src="screenshot-4-summary.svg"/><div class="lbl">4 · Summary</div></div>
    <div class="shot"><img src="screenshot-5-budgets.svg"/><div class="lbl">5 · Budgets + Plus</div></div>
  </div>
</div>

</body></html>
