<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2542"/><stop offset="1" stop-color="#0f1a2e"/>
    </linearGradient>
    <linearGradient id="ac2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13c895"/><stop offset="1" stop-color="#0a8f6b"/>
    </linearGradient>
    <linearGradient id="wp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2542"/><stop offset="1" stop-color="#0f1a31"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg2)"/>
  <circle cx="-100" cy="-100" r="500" fill="#10b981" opacity=".10"/>

  <!-- Headline -->
  <text x="540" y="180" font-family="-apple-system, Inter, sans-serif" font-size="76" font-weight="800" letter-spacing="-2" fill="#fff" text-anchor="middle">Never even</text>
  <text x="540" y="270" font-family="-apple-system, Inter, sans-serif" font-size="76" font-weight="800" letter-spacing="-2" fill="#7ee5b9" text-anchor="middle">open the app.</text>
  <text x="540" y="330" font-family="-apple-system, Inter, sans-serif" font-size="32" font-weight="400" fill="#a0adc5" text-anchor="middle">Home-screen widget · one tap = saved</text>

  <!-- Phone with home screen + widgets -->
  <g transform="translate(240 420)">
    <rect width="600" height="1280" rx="76" fill="#0a0f1a"/>
    <rect x="22" y="22" width="556" height="1236" rx="56" fill="url(#wp)"/>

    <!-- Clock -->
    <text x="300" y="180" font-family="-apple-system, sans-serif" font-size="120" font-weight="200" fill="#fff" text-anchor="middle" letter-spacing="-4">9:41</text>
    <text x="300" y="220" font-family="-apple-system, sans-serif" font-size="24" fill="rgba(255,255,255,.7)" text-anchor="middle">Wed, May 27</text>

    <!-- Big widget (4x2) -->
    <g transform="translate(60 290)">
      <rect width="480" height="280" rx="36" fill="#ffffff"/>
      <rect x="32" y="32" width="56" height="56" rx="14" fill="url(#ac2)"/>
      <text x="60" y="72" font-family="-apple-system, sans-serif" font-size="34" font-weight="800" fill="#fff" text-anchor="middle">F</text>
      <text x="108" y="68" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#6b7689" letter-spacing="2">LOG SPEND</text>

      <!-- Amount input -->
      <rect x="32" y="110" width="416" height="60" rx="18" fill="#eef1f7"/>
      <text x="60" y="151" font-family="-apple-system, sans-serif" font-size="26" fill="#6b7689">đ</text>
      <text x="92" y="151" font-family="-apple-system, sans-serif" font-size="32" font-weight="700" fill="#0d1424">50,000</text>

      <!-- Recent category chips -->
      <g transform="translate(32 190)">
        <rect x="0" y="0" width="98" height="68" rx="18" fill="#dff7ec" stroke="#10b981" stroke-width="3"/>
        <text x="49" y="36" font-size="26" text-anchor="middle">☕</text>
        <text x="49" y="58" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#10b981" text-anchor="middle">Coffee</text>

        <rect x="106" y="0" width="98" height="68" rx="18" fill="#eef1f7"/>
        <text x="155" y="36" font-size="26" text-anchor="middle">🍜</text>
        <text x="155" y="58" font-family="-apple-system, sans-serif" font-size="16" font-weight="600" fill="#6b7689" text-anchor="middle">Food</text>

        <rect x="212" y="0" width="98" height="68" rx="18" fill="#eef1f7"/>
        <text x="261" y="36" font-size="26" text-anchor="middle">🚖</text>
        <text x="261" y="58" font-family="-apple-system, sans-serif" font-size="16" font-weight="600" fill="#6b7689" text-anchor="middle">Taxi</text>

        <rect x="318" y="0" width="98" height="68" rx="18" fill="#eef1f7"/>
        <text x="367" y="36" font-size="26" text-anchor="middle">🛒</text>
        <text x="367" y="58" font-family="-apple-system, sans-serif" font-size="16" font-weight="600" fill="#6b7689" text-anchor="middle">Groc.</text>
      </g>
    </g>

    <!-- Small widget (4x1) -->
    <g transform="translate(60 610)">
      <rect width="480" height="100" rx="28" fill="#ffffff"/>
      <rect x="22" y="22" width="56" height="56" rx="14" fill="url(#ac2)"/>
      <text x="50" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="800" fill="#fff" text-anchor="middle">F</text>
      <rect x="94" y="22" width="304" height="56" rx="14" fill="#eef1f7"/>
      <text x="246" y="58" font-family="-apple-system, sans-serif" font-size="22" fill="#6b7689" text-anchor="middle">đ tap to log…</text>
      <rect x="406" y="22" width="56" height="56" rx="14" fill="url(#ac2)"/>
      <text x="434" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#fff" text-anchor="middle">+</text>
    </g>

    <!-- Tap indicator -->
    <g transform="translate(150 880)">
      <circle cx="60" cy="60" r="55" fill="none" stroke="#10b981" stroke-width="4" opacity=".4"/>
      <circle cx="60" cy="60" r="38" fill="none" stroke="#10b981" stroke-width="4" opacity=".7"/>
      <circle cx="60" cy="60" r="22" fill="#10b981" opacity=".9"/>
      <text x="180" y="58" font-family="-apple-system, sans-serif" font-size="28" font-weight="700" fill="#fff">One tap</text>
      <text x="180" y="92" font-family="-apple-system, sans-serif" font-size="22" fill="#a0adc5">→ Saved instantly</text>
    </g>

    <!-- Dock -->
    <g transform="translate(60 1080)">
      <rect width="480" height="120" rx="32" fill="rgba(0,0,0,.3)"/>
    </g>
  </g>

  <text x="540" y="1820" font-family="-apple-system, sans-serif" font-size="28" font-weight="600" fill="#7ee5b9" text-anchor="middle">📱 4×2 and 4×1 widgets included</text>
</svg>
