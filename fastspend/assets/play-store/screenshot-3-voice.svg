<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1a2e"/><stop offset="1" stop-color="#1a2542"/>
    </linearGradient>
    <linearGradient id="ac3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13c895"/><stop offset="1" stop-color="#0a8f6b"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg3)"/>
  <circle cx="540" cy="960" r="700" fill="#10b981" opacity=".06"/>
  <circle cx="540" cy="960" r="500" fill="#10b981" opacity=".06"/>

  <text x="540" y="180" font-family="-apple-system, Inter, sans-serif" font-size="76" font-weight="800" letter-spacing="-2" fill="#fff" text-anchor="middle">Hands full?</text>
  <text x="540" y="270" font-family="-apple-system, Inter, sans-serif" font-size="76" font-weight="800" letter-spacing="-2" fill="#7ee5b9" text-anchor="middle">Just say it.</text>
  <text x="540" y="330" font-family="-apple-system, Inter, sans-serif" font-size="32" font-weight="400" fill="#a0adc5" text-anchor="middle">Voice entry via Google Assistant</text>

  <!-- Phone -->
  <g transform="translate(240 420)">
    <rect width="600" height="1280" rx="76" fill="#0a0f1a"/>
    <rect x="22" y="22" width="556" height="1236" rx="56" fill="#f0f6ff"/>

    <!-- Mic with pulse -->
    <g transform="translate(300 380)">
      <circle r="180" fill="#10b981" opacity=".08"/>
      <circle r="140" fill="#10b981" opacity=".12"/>
      <circle r="100" fill="#10b981" opacity=".2"/>
      <circle r="76" fill="url(#ac3)"/>
      <text y="20" font-size="74" text-anchor="middle">🎙️</text>
    </g>

    <!-- Confirmation card -->
    <g transform="translate(54 720)">
      <rect width="492" height="500" rx="36" fill="#ffffff" stroke="#e7eaf0" stroke-width="2"/>
      <text x="32" y="62" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#6b7689" letter-spacing="2">HEARD</text>
      <text x="32" y="120" font-family="-apple-system, sans-serif" font-size="32" font-weight="700" fill="#0d1424">"Log</text>
      <rect x="106" y="92" width="92" height="40" rx="8" fill="#dff7ec"/>
      <text x="118" y="120" font-family="-apple-system, sans-serif" font-size="32" font-weight="700" fill="#0b8f6a">50k</text>
      <rect x="212" y="92" width="148" height="40" rx="8" fill="#dff7ec"/>
      <text x="224" y="120" font-family="-apple-system, sans-serif" font-size="32" font-weight="700" fill="#0b8f6a">coffee</text>
      <text x="376" y="120" font-family="-apple-system, sans-serif" font-size="32" font-weight="700" fill="#0d1424">"</text>

      <!-- Parsed -->
      <rect x="32" y="170" width="428" height="120" rx="20" fill="#f7f8fb"/>
      <text x="56" y="210" font-family="-apple-system, sans-serif" font-size="18" fill="#6b7689">AMOUNT</text>
      <text x="56" y="252" font-family="-apple-system, sans-serif" font-size="30" font-weight="700" fill="#0d1424">50,000 đ</text>
      <text x="280" y="210" font-family="-apple-system, sans-serif" font-size="18" fill="#6b7689">CATEGORY</text>
      <text x="280" y="252" font-family="-apple-system, sans-serif" font-size="30" font-weight="700" fill="#0d1424">☕ Coffee</text>

      <!-- Actions -->
      <rect x="32" y="320" width="200" height="80" rx="20" fill="#eef1f7"/>
      <text x="132" y="370" font-family="-apple-system, sans-serif" font-size="26" font-weight="700" fill="#0d1424" text-anchor="middle">Edit</text>
      <rect x="252" y="320" width="208" height="80" rx="20" fill="url(#ac3)"/>
      <text x="356" y="370" font-family="-apple-system, sans-serif" font-size="26" font-weight="700" fill="#fff" text-anchor="middle">Save</text>

      <text x="246" y="450" font-family="-apple-system, sans-serif" font-size="18" fill="#6b7689" text-anchor="middle">Parsed in ~200ms</text>
    </g>
  </g>

  <text x="540" y="1820" font-family="-apple-system, sans-serif" font-size="28" font-weight="600" fill="#7ee5b9" text-anchor="middle">🎙 "Hey Google, log 50k coffee in FastSpend"</text>
</svg>
