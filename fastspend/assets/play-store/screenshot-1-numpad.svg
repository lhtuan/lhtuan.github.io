<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1a2e"/><stop offset="1" stop-color="#1a2542"/>
    </linearGradient>
    <linearGradient id="ac1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13c895"/><stop offset="1" stop-color="#0a8f6b"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg1)"/>
  <!-- Decorative arc -->
  <circle cx="1100" cy="-100" r="500" fill="#10b981" opacity=".10"/>
  <circle cx="-100" cy="2000" r="500" fill="#10b981" opacity=".08"/>

  <!-- Headline -->
  <text x="540" y="180" font-family="-apple-system, Inter, sans-serif" font-size="76" font-weight="800" letter-spacing="-2" fill="#fff" text-anchor="middle">Three taps. That's it.</text>
  <text x="540" y="240" font-family="-apple-system, Inter, sans-serif" font-size="32" font-weight="400" fill="#a0adc5" text-anchor="middle">Type the amount. Pick a category. Done.</text>

  <!-- Phone -->
  <g transform="translate(240 320)">
    <rect width="600" height="1320" rx="76" fill="#0a0f1a"/>
    <rect x="22" y="22" width="556" height="1276" rx="56" fill="#f7f8fb"/>
    <!-- Status bar -->
    <text x="80" y="80" font-family="-apple-system, sans-serif" font-size="26" font-weight="600" fill="#0d1424">9:41</text>
    <!-- Top toggle -->
    <rect x="200" y="64" width="200" height="38" rx="19" fill="#eef1f7"/>
    <rect x="206" y="70" width="94" height="26" rx="13" fill="#fff"/>
    <text x="253" y="89" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#0d1424" text-anchor="middle">Spend</text>
    <text x="346" y="89" font-family="-apple-system, sans-serif" font-size="20" font-weight="600" fill="#6b7689" text-anchor="middle">Income</text>
    <!-- Amount -->
    <text x="300" y="220" font-family="-apple-system, sans-serif" font-size="26" fill="#6b7689" text-anchor="middle">VND</text>
    <text x="300" y="320" font-family="-apple-system, sans-serif" font-size="100" font-weight="700" letter-spacing="-3" fill="#0d1424" text-anchor="middle">50,000đ</text>

    <!-- Categories row -->
    <g transform="translate(40 380)">
      <g transform="translate(0 0)">
        <circle cx="48" cy="48" r="48" fill="#dff7ec" stroke="#10b981" stroke-width="4"/>
        <text x="48" y="58" font-size="36" text-anchor="middle">☕</text>
        <text x="48" y="120" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#10b981" text-anchor="middle">Coffee</text>
      </g>
      <g transform="translate(110 0)">
        <circle cx="48" cy="48" r="44" fill="#eef1f7"/>
        <text x="48" y="58" font-size="32" text-anchor="middle">🍜</text>
        <text x="48" y="120" font-family="-apple-system, sans-serif" font-size="18" fill="#6b7689" text-anchor="middle">Food</text>
      </g>
      <g transform="translate(220 0)">
        <circle cx="48" cy="48" r="44" fill="#eef1f7"/>
        <text x="48" y="58" font-size="32" text-anchor="middle">🚖</text>
        <text x="48" y="120" font-family="-apple-system, sans-serif" font-size="18" fill="#6b7689" text-anchor="middle">Transport</text>
      </g>
      <g transform="translate(330 0)">
        <circle cx="48" cy="48" r="44" fill="#eef1f7"/>
        <text x="48" y="58" font-size="32" text-anchor="middle">🛒</text>
        <text x="48" y="120" font-family="-apple-system, sans-serif" font-size="18" fill="#6b7689" text-anchor="middle">Groc.</text>
      </g>
      <g transform="translate(440 0)">
        <circle cx="48" cy="48" r="44" fill="#eef1f7"/>
        <text x="48" y="58" font-size="32" text-anchor="middle">🛍️</text>
        <text x="48" y="120" font-family="-apple-system, sans-serif" font-size="18" fill="#6b7689" text-anchor="middle">Shop</text>
      </g>
    </g>

    <!-- Numpad -->
    <g transform="translate(60 580)" font-family="-apple-system, sans-serif" font-weight="600" fill="#0d1424" text-anchor="middle">
      <text x="80" y="50" font-size="56">1</text><text x="240" y="50" font-size="56">2</text><text x="400" y="50" font-size="56">3</text>
      <text x="80" y="170" font-size="56">4</text>
      <rect x="200" y="120" width="100" height="80" rx="20" fill="#eef1f7"/>
      <text x="240" y="170" font-size="56">5</text>
      <text x="400" y="170" font-size="56">6</text>
      <text x="80" y="290" font-size="56">7</text><text x="240" y="290" font-size="56">8</text><text x="400" y="290" font-size="56">9</text>
      <text x="80" y="410" font-size="40" fill="#6b7689">000</text>
      <text x="240" y="410" font-size="56">0</text>
      <text x="400" y="410" font-size="40" fill="#6b7689">⌫</text>
    </g>

    <!-- FAB -->
    <rect x="60" y="1130" width="480" height="120" rx="32" fill="url(#ac1)"/>
    <text x="300" y="1205" font-family="-apple-system, sans-serif" font-size="38" font-weight="700" fill="#fff" text-anchor="middle">Save · ⏎</text>
  </g>

  <!-- Bottom label -->
  <text x="540" y="1780" font-family="-apple-system, sans-serif" font-size="28" font-weight="600" fill="#7ee5b9" text-anchor="middle">⏱ Cold-start to save in under 3 seconds</text>
</svg>
